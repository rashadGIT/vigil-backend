name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run type-check

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  test:
    name: Tests (unit + contract)
    runs-on: ubuntu-latest
    needs: [type-check]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vigil
          POSTGRES_PASSWORD: vigil
          POSTGRES_DB: vigil_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://vigil:vigil@localhost:5432/vigil_test
      NODE_ENV: test
      DEV_AUTH_BYPASS: 'true'
      INTERNAL_API_KEY: ci-internal-key-test
      N8N_WEBHOOK_GRIEF_FOLLOWUP: https://PLACEHOLDER.n8n.cloud/test
      N8N_WEBHOOK_INTAKE_NOTIFY: https://PLACEHOLDER.n8n.cloud/test
      N8N_WEBHOOK_STAFF_NOTIFY: https://PLACEHOLDER.n8n.cloud/test
      N8N_WEBHOOK_DOC_GENERATE: https://PLACEHOLDER.n8n.cloud/test
      N8N_WEBHOOK_REVIEW_REQUEST: https://PLACEHOLDER.n8n.cloud/test

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Run migrations
        run: npx prisma migrate deploy
      - name: Run tests with coverage
        run: npm run test:coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: backend-coverage
          path: coverage/
          retention-days: 7
