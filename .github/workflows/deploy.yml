name: Deploy Backend

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build & Deploy Lambda
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-2

      - name: Fetch DATABASE_URL from Secrets Manager
        run: |
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id vigil/rds/credentials \
            --region us-east-2 \
            --query SecretString \
            --output text)
          HOST=$(echo $SECRET | jq -r '.host')
          PORT=$(echo $SECRET | jq -r '.port')
          USER=$(echo $SECRET | jq -r '.username')
          PASS=$(echo $SECRET | jq -r '.password' | python3 -c "import sys,urllib.parse; print(urllib.parse.quote(sys.stdin.read().strip()))")
          DB=$(echo $SECRET | jq -r '.dbname')
          echo "DATABASE_URL=postgresql://${USER}:${PASS}@${HOST}:${PORT}/${DB}?connection_limit=1&connect_timeout=10" >> $GITHUB_ENV

      - run: npm ci
      - run: npx prisma generate
      - run: npx nest build
      - run: npx prisma migrate deploy
      - run: zip -r /tmp/vigil-api.zip dist/ node_modules/.prisma/ prisma/

      - name: Upload zip to S3
        run: |
          aws s3 cp /tmp/vigil-api.zip \
            s3://vigil-documents-887067305712-us-east-2/lambda-deployments/vigil-api.zip \
            --region us-east-2

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name vigil-api \
            --s3-bucket vigil-documents-887067305712-us-east-2 \
            --s3-key lambda-deployments/vigil-api.zip \
            --region us-east-2

      - name: Wait for Lambda update
        run: |
          aws lambda wait function-updated \
            --function-name vigil-api \
            --region us-east-2
